name: Experiment Pipeline

on:
  push:
  pull_request:

jobs:
  experiment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run pytest
        run: python -m pytest

      - name: Run planner experiment
        if: hashFiles('experiment_config.json') != ''
        run: |
          python scripts/run_planner_experiment.py --config experiment_config.json

      - name: Generate experiment report
        if: hashFiles('experiment_results.json') != ''
        run: |
          python scripts/generate_experiment_report.py \
            --experiment-results experiment_results.json \
            $(test -f policy_sweep_results.json && echo "--policy-sweep policy_sweep_results.json" || true) \
            --output-json experiment_report.json \
            --output-md experiment_report.md

      - name: Upload experiment artifacts
        if: hashFiles('experiment_results.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: experiment-artifacts
          path: |
            experiment_results.json
            policy_sweep_results.json
            experiment_report.json
            experiment_report.md
            planner_run_envelope_*.json
          if-no-files-found: warn
